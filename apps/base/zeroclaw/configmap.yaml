apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-config
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/part-of: zeroclaw
data:
  config.toml: |
    workspace_dir = "/zeroclaw-data/workspace"
    config_path = "/zeroclaw-data/.zeroclaw/config.toml"

    [gateway]
    port = 42617
    host = "[::]"
    allow_public_bind = true
    require_pairing = true
    web_dist_dir = "/usr/share/zeroclawlabs/web/dist"

    [channels.telegram]
    enabled = true
    bot_token = "${TELEGRAM_BOT_TOKEN}"
    allowed_users = ["843816777"]
    use_long_polling = true

    [agent]
    max_tool_iterations = 30
    parallel_tools = true

    [providers]
    fallback = "https://foundation-models.api.cloud.ru/v1"

    [providers.models."https://foundation-models.api.cloud.ru/v1"]
    model = "Qwen/Qwen3-235B-A22B-Instruct-2507"
    api_key = "${OPENAI_API_KEY}"
