apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/part-of: zeroclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zeroclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zeroclaw
        app.kubernetes.io/part-of: zeroclaw
    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-config
          image: alpine:3.22
          command:
            - sh
            - -ec
            - |
              apk add --no-cache gettext >/dev/null
              mkdir -p /zeroclaw-data/.zeroclaw /zeroclaw-data/workspace
              envsubst < /config/config.toml > /tmp/config.toml
              if [ ! -f /zeroclaw-data/.zeroclaw/config.toml ] || ! cmp -s /tmp/config.toml /zeroclaw-data/.zeroclaw/config.toml; then
                cp -f /tmp/config.toml /zeroclaw-data/.zeroclaw/config.toml
              fi
              chmod 600 /zeroclaw-data/.zeroclaw/config.toml
              chown -R 65534:65534 /zeroclaw-data
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-api-key
                  key: openai-api-key
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-api-key
                  key: telegram-bot-token
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /zeroclaw-data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: zeroclaw
          image: ghcr.io/zeroclaw-labs/zeroclaw:v0.7.5
          imagePullPolicy: IfNotPresent
          args: ["daemon"]
          ports:
            - name: gateway
              containerPort: 42617
              protocol: TCP
          env:
            - name: HTTPS_PROXY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-api-key
                  key: https_proxy
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-api-key
                  key: api-key
            - name: LANG
              value: C.UTF-8
            - name: HOME
              value: /zeroclaw-data
            - name: ZEROCLAW_WORKSPACE
              value: /zeroclaw-data/workspace
            - name: ZEROCLAW_GATEWAY_PORT
              value: "42617"
          volumeMounts:
            - name: data
              mountPath: /zeroclaw-data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: 64Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: zeroclaw-config
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
