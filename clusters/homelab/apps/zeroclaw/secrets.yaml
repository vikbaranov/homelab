apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zeroclaw-api-key
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: apps-zeroclaw
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vaultwarden
    kind: ClusterSecretStore
  target:
    name: zeroclaw-api-key
  data:
    - secretKey: api-key
      remoteRef:
        key: 861f5786-2fb2-4842-8224-66e5405e3130
        property: ZEROCLAW_API_KEY
