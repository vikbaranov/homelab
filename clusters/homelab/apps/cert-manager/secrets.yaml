---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-secrets
  labels:
    app.kubernetes.io/name: vaultwarden-secrets
    app.kubernetes.io/instance: infra-cloudflare-api-token
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
      name: vaultwarden
      kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
  data:
    - secretKey: api-token
      remoteRef:
        key: dd59dd9e-b17f-4482-b7d4-51aa21bbdfba
        property: cloudflare-api-token
    - secretKey: email
      remoteRef:
        key: dd59dd9e-b17f-4482-b7d4-51aa21bbdfba
        property: email
