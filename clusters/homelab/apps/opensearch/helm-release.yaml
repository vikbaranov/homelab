apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch
spec:
  driftDetection:
    mode: enabled
  values:
    clusterName: opensearch
    masterService: opensearch-master
    singleNode: true
    replicas: 1
    config:
      opensearch.yml: |
        cluster.name: opensearch
        network.host: 0.0.0.0
        discovery.type: single-node
        plugins.security.disabled: true
    persistence:
      enabled: true
      storageClass: local
      size: 2Gi
    protocol: http
    securityConfig:
      enabled: false
