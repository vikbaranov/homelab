apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: goldpinger
  namespace: monitoring
spec:
  parentRefs:
    - name: internal
      namespace: envoy-gateway-system
  hostnames:
    - goldpinger.${cluster_subdomain}
  rules:
    - backendRefs:
        - name: goldpinger
          port: 8081
