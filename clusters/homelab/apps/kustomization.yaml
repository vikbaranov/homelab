apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../apps/bundles/prod-stable
  - arc-controller
  - linstor
  - arc-runners
  - bitwarden-cli
  - blackbox-exporter
  - cert-manager
  - cilium
  - cloudnative-pg
  - csi-nfs
  - envoy-gateway
  - external-dns
  - external-secrets
  - goldpinger
  - httpbin
  - immich
  - istio
  - it-tools
  - jellyfin
  - misc
  - n8n
  - opensearch
  - open-webui
  - qbittorrent
  - vaultwarden
  - zeroclaw
  - victoria-logs
  - victoria-metrics
  - flux
  - ../misc
patches:
  # delete istio
  - path: istio/rm-objects.yaml
  # victoria-logs
  - path: victoria-logs/rm-objects.yaml
  # delete mattermost
  - path: mattermost/rm-objects.yaml
  # delete open-webui
  - path: open-webui/rm-objects.yaml
  # delete csi-nfs
  - path: csi-nfs/rm-objects.yaml
  # delete opensearch
  - path: opensearch/rm-objects.yaml

  - path: arc-runners/helm-release.yaml
    target:
      kind: HelmRelease
      name: arc-runner-set
  - path: blackbox-exporter/helm-release.yaml
    target:
      kind: HelmRelease
      name: blackbox-exporter
  - path: cert-manager/helm-release.yaml
    target:
      kind: HelmRelease
      name: cert-manager
  - path: cilium/helm-release.yaml
    target:
      kind: HelmRelease
      name: cilium
  - path: csi-nfs/helm-release.yaml
    target:
      kind: HelmRelease
      name: csi-nfs
  - path: external-dns/helm-release-public.yaml
    target:
      kind: HelmRelease
      name: external-dns
  - path: external-secrets/helm-release.yaml
    target:
      kind: HelmRelease
      name: external-secrets
  - path: immich/immich-values.yaml
    target:
      kind: HelmRelease
      name: immich
  - path: istio/helm-release.yaml
    target:
      kind: HelmRelease
      name: istiod
  - path: jellyfin/jellyfin-values.yaml
    target:
      kind: HelmRelease
      name: jellyfin
  - path: linstor/helm-release-cluster.yaml
    target:
      kind: HelmRelease
      name: linstor-cluster
  - path: n8n/n8n-values.yaml
    target:
      kind: HelmRelease
      name: n8n
  - path: opensearch/helm-release.yaml
    target:
      kind: HelmRelease
      name: opensearch
  - path: open-webui/open-webui-values.yaml
    target:
      kind: HelmRelease
      name: open-webui
  - path: goldpinger/goldpinger-values.yaml
    target:
      kind: HelmRelease
      name: goldpinger
  - path: podinfo/podinfo-values.yaml
    target:
      kind: HelmRelease
      name: podinfo
  - path: qbittorrent/path.yaml
    target:
      kind: Deployment
      name: qbittorrent
  - path: vaultwarden/vaultwarden-values.yaml
    target:
      kind: HelmRelease
      name: vaultwarden
  - path: zeroclaw/helm-release.yaml
    target:
      kind: HelmRelease
      name: zeroclaw
  - path: victoria-logs/helm-release.yaml
    target:
      kind: HelmRelease
      name: vls
  - path: victoria-metrics/helm-release.yaml
    target:
      kind: HelmRelease
      name: vmks
