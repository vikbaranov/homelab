apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: homelab
spec:
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server versioning=semver
              tag: v2.7.5
            env:
              REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
              IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: port
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-superuser
                    key: password
    immich:
      persistence:
        library:
          existingClaim: immich-pvc-local
    machine-learning:
      persistence:
        tmp:
          type: emptyDir
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
      persistence:
        data:
          enabled: true
          size: 1Gi
          type: emptyDir
          accessMode: ReadWriteOnce
